services:
  - type: web
    name: hotel-booking-backend
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # set this manually in Render dashboard
      - key: APP_BASE_URL
        sync: false   # e.g. https://hotel-booking-backend.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: WHATSAPP_QR_SECRET
        sync: false   # any strong password you choose — used to protect the /whatsapp/qr page
